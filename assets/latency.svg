<svg xmlns="http://www.w3.org/2000/svg" width="760" height="296" viewBox="0 0 760 296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="759" height="295" rx="16" fill="#ffffff" stroke="#e6e8eb"/>

  <text x="36" y="42" font-size="19" font-weight="600" fill="#0f172a">DiT sampling latency &#8212; 50-step Wan2.1-T2V-1.3B</text>
  <text x="36" y="65" font-size="12.5" fill="#64748b">H100 &#183; bf16 &#183; summed over 100 batch-1 DiT forwards &#183; T5/VAE excluded &#183; lower is better</text>

  <line x1="132" y1="90" x2="132" y2="256" stroke="#e2e8f0" stroke-width="1"/>

  <!-- eager -->
  <text x="120" y="126" text-anchor="end" font-size="14" font-weight="600" fill="#334155">eager</text>
  <rect x="132" y="104" width="428" height="34" rx="7" fill="#cbd5e1"/>
  <text x="572" y="126" font-size="14" font-weight="700" fill="#0f172a">93.0 s</text>
  <text x="626" y="126" font-size="12" fill="#94a3b8">1.00&#215; &#183; stock Wan</text>

  <!-- compile -->
  <text x="120" y="182" text-anchor="end" font-size="14" font-weight="600" fill="#334155">compile</text>
  <rect x="132" y="160" width="373.9" height="34" rx="7" fill="#94a3b8"/>
  <text x="518" y="182" font-size="14" font-weight="700" fill="#0f172a">81.3 s</text>
  <text x="572" y="182" font-size="12" fill="#94a3b8">1.14&#215;</text>

  <!-- CODA -->
  <text x="120" y="238" text-anchor="end" font-size="14" font-weight="700" fill="#1d4ed8">CODA</text>
  <rect x="132" y="216" width="332.8" height="34" rx="7" fill="#2563eb"/>
  <text x="477" y="238" font-size="14" font-weight="700" fill="#1d4ed8">72.3 s</text>
  <text x="531" y="238" font-size="12" font-weight="600" fill="#2563eb">1.29&#215; vs eager</text>

  <text x="36" y="282" font-size="11.5" fill="#94a3b8">CODA is also 1.12&#215; vs torch.compile(max-autotune); decoded video matches eager at 24.4 dB PSNR / 0.93 SSIM.</text>
</svg>
